<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AetherCalc - Simple & Scientific Calculator</title>
  <meta name="description" content="A professional, modern, and beautiful glassmorphic scientific calculator with degree/radian modes, computation history, and advanced mathematical features.">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Background Decorative Spheres -->
  <div class="bg-sphere sphere-1"></div>
  <div class="bg-sphere sphere-2"></div>
  <div class="bg-sphere sphere-3"></div>

  <div class="app-container">
    <!-- Calculator Card -->
    <main class="calculator-card" id="calculator">
      <!-- Calculator Header -->
      <header class="calc-header">
        <div class="logo">
          <span class="logo-icon">▲</span>
          <h1 class="logo-text">AETHER<span>CALC</span></h1>
        </div>
        <div class="header-controls">
          <!-- History Button -->
          <button class="icon-btn" id="history-toggle" aria-label="Toggle History" title="View History">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
          </button>
          <!-- Theme Toggle -->
          <button class="icon-btn" id="theme-toggle" aria-label="Toggle Theme" title="Toggle Light/Dark Mode">
            <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
          </button>
        </div>
      </header>

      <!-- Calculator Display -->
      <section class="display-container" aria-live="polite">
        <!-- Expression Preview (Formulas) -->
        <div class="display-expr" id="display-expr" tabindex="-1"></div>
        
        <!-- Active Value / Input Screen -->
        <div class="display-main-wrapper">
          <input type="text" class="display-main" id="display-main" autocomplete="off" spellcheck="false" placeholder="0" aria-label="Calculator display screen">
        </div>

        <!-- Display Badges / Status Bar -->
        <div class="display-status">
          <span class="badge" id="mode-deg-rad">DEG</span>
          <span class="badge" id="mode-2nd" style="display: none;">2nd</span>
          <span class="badge badge-error" id="error-badge" style="display: none;">ERROR</span>
        </div>
      </section>

      <!-- Mobile Panel Toggles (visible only on mobile) -->
      <div class="panel-toggles">
        <button class="toggle-btn active" id="btn-show-basic">Basic</button>
        <button class="toggle-btn" id="btn-show-scientific">Scientific</button>
      </div>

      <!-- Keypad Container -->
      <div class="keypad-container">
        <!-- Scientific Keyboard Panel -->
        <div class="keypad-grid scientific-panel" id="scientific-panel">
          <button class="btn btn-sci" data-action="2nd" id="btn-2nd">2nd</button>
          <button class="btn btn-sci" data-action="deg-rad" id="btn-deg-rad">DEG</button>
          <button class="btn btn-sci" data-val="sin" data-shift-val="asin">sin</button>
          <button class="btn btn-sci" data-val="cos" data-shift-val="acos">cos</button>
          <button class="btn btn-sci" data-val="tan" data-shift-val="atan">tan</button>

          <button class="btn btn-sci" data-val="^" data-shift-val="sqrt">x<sup>y</sup></button>
          <button class="btn btn-sci" data-val="sqrt" data-shift-val="cbrt">√</button>
          <button class="btn btn-sci" data-val="sqr" data-shift-val="cube">x²</button>
          <button class="btn btn-sci" data-val="ln" data-shift-val="exp">ln</button>
          <button class="btn btn-sci" data-val="log" data-shift-val="10^">log</button>

          <button class="btn btn-sci" data-val="pi">π</button>
          <button class="btn btn-sci" data-val="e">e</button>
          <button class="btn btn-sci" data-val="!">n!</button>
          <button class="btn btn-sci" data-val="abs">|x|</button>
          <button class="btn btn-sci" data-val="%">mod</button>
        </div>

        <!-- Basic Keyboard Panel -->
        <div class="keypad-grid basic-panel" id="basic-panel">
          <button class="btn btn-op btn-clear" data-action="clear" id="key-clear">C</button>
          <button class="btn btn-op" data-val="(">(</button>
          <button class="btn btn-op" data-val=")">)</button>
          <button class="btn btn-op btn-delete" data-action="delete" id="key-delete">DEL</button>

          <button class="btn btn-num" data-val="7">7</button>
          <button class="btn btn-num" data-val="8">8</button>
          <button class="btn btn-num" data-val="9">9</button>
          <button class="btn btn-op" data-val="/">÷</button>

          <button class="btn btn-num" data-val="4">4</button>
          <button class="btn btn-num" data-val="5">5</button>
          <button class="btn btn-num" data-val="6">6</button>
          <button class="btn btn-op" data-val="*">×</button>

          <button class="btn btn-num" data-val="1">1</button>
          <button class="btn btn-num" data-val="2">2</button>
          <button class="btn btn-num" data-val="3">3</button>
          <button class="btn btn-op" data-val="-">−</button>

          <button class="btn btn-num" data-val="0">0</button>
          <button class="btn btn-num" data-val=".">.</button>
          <button class="btn btn-op" data-action="ans">ans</button>
          <button class="btn btn-op" data-val="+">+</button>

          <button class="btn btn-equal" data-action="equal" id="key-equal">=</button>
        </div>
      </div>
    </main>

    <!-- Slide-out History Drawer -->
    <aside class="history-drawer" id="history-drawer" aria-label="Calculation history">
      <div class="drawer-header">
        <h2>History</h2>
        <button class="icon-btn" id="history-close" aria-label="Close History">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <div class="drawer-content" id="history-list">
        <!-- History items will be injected here dynamically -->
        <div class="empty-history">No calculations yet</div>
      </div>
      <div class="drawer-footer">
        <button class="btn btn-clear-history" id="clear-history">Clear History</button>
      </div>
    </aside>
  </div>

  <script src="script.js"></script>
</body>
</html>
